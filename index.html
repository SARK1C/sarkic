<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARKIC | LINKS</title>
    
    <!-- SEO & Social Meta Tags -->
    <meta name="description" content="Official links for SARKIC music and socials.">
    <meta property="og:title" content="SARKIC | LINKS">
    <meta property="og:image" content="https://github.com">
    <meta property="og:type" content="website">

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">

    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #ffffff;
            --button-bg: #21262d;
            --button-hover: #30363d;
            --accent-color: #58a6ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-pic {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            margin-bottom: 16px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 8px; }
        p { color: #8b949e; margin-bottom: 32px; }

        .links-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            background-color: var(--button-bg);
            color: var(--text-color);
            text-decoration: none;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            transition: transform 0.2s, background-color 0.2s;
            border: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .link-card:hover {
            background-color: var(--button-hover);
            transform: translateY(-2px);
            border-color: var(--accent-color);
        }

        .link-card:active { transform: scale(0.98); }

        /* Responsive Video Wrapper */
        .video-container {
            width: 100%;
            max-width: 400px;
            margin-top: 32px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #30363d;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #484f58;
        }
    </style>
</head>
<body>

    <img src="https://github.com" alt="SARKIC Profile" class="profile-pic">

    <h1>SARKIC</h1>
    <p>Music & Socials</p>

    <div class="links-container">
        <a href="https://instagram.com_" class="link-card" target="_blank">
            <i class="fab fa-instagram"></i> INSTAGRAM
        </a>
        <a href="https://bandcamp.com" class="link-card" target="_blank">
            <i class="fab fa-bandcamp"></i> BANDCAMP
        </a>
        <a href="https://spotify.com" class="link-card" target="_blank">
            <i class="fab fa-spotify"></i> SPOTIFY
        </a>
        <a href="https://apple.com" class="link-card" target="_blank">
            <i class="fab fa-apple"></i> APPLE MUSIC
        </a>
    </div>

    <!-- YouTube Embed Section -->
    <div class="video-container">
        <div class="video-wrapper">
            <iframe src="https://youtube.com" 
                    title="SARKIC Music Video" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
            </iframe>
        </div>
    </div>

    <div class="footer">
        Powered by GitHub Pages
    </div>

</body>
</html>
