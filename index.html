<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARKIC | LINKS</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=VT323&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Draculitos';
            src: url('DraculitoS_.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --bg-color: #0a0a0a;
            --text-color: #f0f0f0;
            --card-bg: #1c1c1c;
            --card-hover: #2a2a2a;
            --border-color: #555555;
        }

        body {
            font-family: 'VT323', monospace;
            background: 
                linear-gradient(rgba(10, 10, 10, 0.88), rgba(10, 10, 10, 0.92)),
                url('logo%20sarkic.jpg') center center / cover no-repeat fixed;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
            line-height: 1.4;
        }

        .profile-pic {
            width: 110px;
            height: 110px;
            border-radius: 0;
            border: 4px solid #ffffff;
            box-shadow: 0 0 0 6px #1c1c1c;
            margin-bottom: 30px;
            image-rendering: pixelated;
            z-index: 2;
            display: none;
        }

        .band-name {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 5.1rem;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 12px;
            color: #ffffff;
            line-height: 0.78;
            text-transform: uppercase;
            text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.95);
            z-index: 2;
        }

        .album-section {
            width: 100%;
            max-width: 720px;
            margin-bottom: 50px;
            text-align: center;
            z-index: 2;
        }

        .youtube-embed {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border: 4px solid #ffffff;
            box-shadow: 0 0 0 8px #1c1c1c;
            border-radius: 0;
        }

        .youtube-embed iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .links-container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 50px;
            z-index: 2;
        }

        .link-card {
            font-family: 'UnifrakturMaguntia', cursive;
            background-color: var(--card-bg);
            color: var(--text-color);
            text-decoration: none;
            padding: 18px 24px;
            border: 3px solid var(--border-color);
            font-size: 1.25rem;
            font-weight: 400;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            text-transform: capitalize;
            display: grid;
            grid-template-columns: auto 1fr;
            align-items: center;
            gap: 14px;
            text-align: center;
        }

        .link-card svg {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
            fill: #f0f0f0;
            justify-self: start;
        }

        .link-card:hover {
            background-color: var(--card-hover);
            border-color: #ffffff;
            color: #ffffff;
            transform: translateY(-3px);
        }

        .link-card:hover svg {
            fill: #ffffff;
        }

        .footer {
            margin-top: auto;
            font-family: 'VT323', monospace;
            font-size: 0.95rem;
            color: #777777;
            text-align: center;
            letter-spacing: 1px;
            z-index: 2;
        }
    </style>
</head>
