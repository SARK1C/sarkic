<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARKIC | LINKS</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #ffffff;
            --button-bg: #21262d;
            --button-hover: #30363d;
            --accent-color: #58a6ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        .profile-pic {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        p {
            color: #8b949e;
            margin-bottom: 32px;
        }

        .links-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            background-color: var(--button-bg);
            color: var(--text-color);
            text-decoration: none;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            transition: transform 0.2s, background-color 0.2s;
            border: 1px solid #30363d;
        }

        .link-card:hover {
            background-color: var(--button-hover);
            transform: translateY(-2px);
            border-color: var(--accent-color);
        }

        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #484f58;
        }
    </style>
</head>
<body>

    <img src="https://github.com/SARK1C.png" alt="Profile Picture" class="profile-pic">

    <h1>SARKIC</h1>
    <p></p>

    <div class="links-container">
        <a href="https://instagram.com/_sarkic_" class="link-card" target="_blank">INSTAGRAM</a>
        <a href="https://sark1c.bandcamp.com/album/sarkic" class="link-card" target="_blank">BANDCAMP</a>
        <a href="https://open.spotify.com/artist/1HtzfTI82NKghc7D40Tsgm?si=mf8W-M52S-W6-MnsD3UoGw" class="link-card" target="_blank">SPOTIFY</a>
        <a href="https://music.apple.com/us/album/sarkic-ep/1880842043" class="link-card">APPLE MUSIC</a>
    </div>

    <div class="footer">
        Powered by GitHub Pages
    </div>

</body>
</html>
